<div class="min-h-screen bg-black pt-32 pb-20 px-6 flex flex-col items-center">
  <div class="max-w-4xl w-full">
    <div class="border-l-8 border-white pl-6 mb-16">
      <h1
        class="text-6xl md:text-8xl font-black text-white mb-2 uppercase tracking-tighter italic leading-none"
      >
        The Next <span class="text-purple-600 italic">Chapter.</span>
      </h1>
      <p class="text-gray-400 font-bold uppercase tracking-[0.2em] text-xs">
        {{ eventData().description }}
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 items-start">
      <div class="bg-white p-8 shadow-[12px_12px_0px_0px_#9333ea] border-2 border-white">
        <h3
          class="text-black font-black uppercase text-2xl mb-8 italic border-b-4 border-purple-600 inline-block"
        >
          Lineup // DJ Set
        </h3>
        <ul class="space-y-6">
          @for (item of eventData().lineup; track item.time) {
            <li class="flex flex-col border-b border-black/10 pb-2">
              <span class="text-purple-600 font-black text-xs tracking-widest">{{
                item.time
              }}</span>
              <span class="text-black font-black uppercase text-lg leading-tight">{{
                item.act
              }}</span>
            </li>
          }
        </ul>
      </div>

      <div class="flex flex-col gap-6">
        <div
          class="bg-purple-600 p-10 flex flex-col items-center text-center shadow-[12px_12px_0px_0px_rgba(255,255,255,0.1)]"
        >
          <div class="text-5xl mb-6 animate-pulse">📍</div>
          <h3
            class="text-white font-black text-4xl tracking-tighter uppercase italic leading-none mb-2"
          >
            {{ eventData().location }}
          </h3>
          <p class="text-purple-200 font-bold text-sm mb-8 uppercase tracking-tight">
            {{ eventData().address }}
          </p>

          <button
            (click)="openMaps()"
            class="w-full bg-white text-black font-black py-4 uppercase tracking-tighter text-xl hover:bg-black hover:text-white transition-all transform hover:-translate-y-1 active:translate-y-0"
          >
            Apri in Maps
          </button>
        </div>

        <div class="border-2 border-dashed border-white/20 p-6 flex items-center justify-center">
          <span class="text-gray-600 font-black uppercase text-[10px] tracking-[0.4em]">
            More info coming soon
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
