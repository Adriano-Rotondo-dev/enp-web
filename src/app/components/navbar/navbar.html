<nav
  class="fixed top-0 left-0 w-full z-50 transition-all duration-300 bg-black/20 backdrop-blur-md border-b border-white/10 py-4 px-8 flex justify-between items-center"
>
  <div class="text-2xl font-black tracking-tighter cursor-pointer shrink-0">
    <a
      routerLink="/"
      routerLinkActive="text-purple-500"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="text-purple-500">EMO</span><span class="text-white">NIGHTPALERMO</span>
    </a>
  </div>

  <div class="hidden md:flex gap-8 font-bold text-sm uppercase tracking-widest text-gray-300">
    <a
      routerLink="/"
      routerLinkActive="text-purple-500"
      [routerLinkActiveOptions]="{ exact: true }"
      class="hover:text-purple-400 transition-all duration-300 relative group"
    >
      Home
      <span
        class="absolute -bottom-1 left-0 w-0 h-0.5 bg-purple-500 transition-all group-hover:w-full"
      ></span>
    </a>
    <a
      routerLink="/prossimo-evento"
      routerLinkActive="text-purple-500"
      class="hover:text-purple-400 transition-all duration-300 relative group"
    >
      Prossimo Evento
      <span
        class="absolute -bottom-1 left-0 w-0 h-0.5 bg-purple-500 transition-all group-hover:w-full"
      ></span>
    </a>
    <a
      routerLink="/archivio-foto"
      routerLinkActive="text-purple-500"
      class="hover:text-purple-400 transition-all duration-300 relative group"
    >
      Archivio foto
      <span
        class="absolute -bottom-1 left-0 w-0 h-0.5 bg-purple-500 transition-all group-hover:w-full"
      ></span>
    </a>
    <a
      routerLink="/archivio-eventi"
      routerLinkActive="text-purple-500"
      class="hover:text-purple-400 transition-all duration-300 relative group"
    >
      Archivio Eventi
      <span
        class="absolute -bottom-1 left-0 w-0 h-0.5 bg-purple-500 transition-all group-hover:w-full"
      ></span>
    </a>
    <a
      routerLink="/chi-siamo"
      routerLinkActive="text-purple-500"
      class="hover:text-purple-400 transition-all duration-300 relative group"
    >
      Chi Siamo
      <span
        class="absolute -bottom-1 left-0 w-0 h-0.5 bg-purple-500 transition-all group-hover:w-full"
      ></span>
    </a>
  </div>

  <div class="flex items-center gap-4">
    <button
      class="hidden sm:block bg-white text-black hover:bg-purple-600 hover:text-white px-6 py-2 rounded-full text-xs font-black uppercase tracking-tighter transition-all active:scale-95 shadow-lg"
    >
      Contattaci
    </button>

    <button (click)="toggleMenu()" class="md:hidden text-white focus:outline-none">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-8 w-8"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        />
      </svg>
    </button>
  </div>

  <div
    *ngIf="isMenuOpen()"
    class="absolute top-full left-0 w-full bg-black/90 backdrop-blur-lg flex flex-col p-8 gap-6 md:hidden border-b border-white/10 animate-in fade-in slide-in-from-top-4"
  >
    <a
      routerLink="/"
      (click)="isMenuOpen.set(false)"
      class="text-white font-bold uppercase tracking-widest"
      >Home</a
    >
    <a
      routerLink="/prossimo-evento"
      (click)="isMenuOpen.set(false)"
      class="text-white font-bold uppercase tracking-widest"
      >Prossimo Evento</a
    >
    <a
      routerLink="/archivio-foto"
      (click)="isMenuOpen.set(false)"
      class="text-white font-bold uppercase tracking-widest"
      >Archivio Foto</a
    >
    <a
      routerLink="/archivio-eventi"
      (click)="isMenuOpen.set(false)"
      class="text-white font-bold uppercase tracking-widest"
      >Archivio Eventi</a
    >
    <a
      routerLink="/chi-siamo"
      (click)="isMenuOpen.set(false)"
      class="text-white font-bold uppercase tracking-widest"
      >Chi Siamo</a
    >
    <button class="sm:hidden bg-white text-black py-3 rounded-full font-black uppercase text-xs">
      Contattaci
    </button>
  </div>
</nav>
