<div class="min-h-screen bg-black flex flex-col items-center justify-center px-6 font-mono">
  <div class="mb-12 opacity-20 text-xs tracking-[0.5em] text-white uppercase italic">
    ENP // Restricted Area
  </div>

  <div class="w-full max-w-md bg-white/5 border border-white/10 p-10 backdrop-blur-sm relative">
    <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-purple-600"></div>
    <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-purple-600"></div>

    <h2 class="text-white font-black uppercase text-2xl mb-8 tracking-tighter italic">
      Enter Access <span class="text-purple-600">Key_</span>
    </h2>

    <form (ngSubmit)="login()" class="space-y-6">
      <!-- hidden username _keeps browsers happy -->
      <input
        type="text"
        name="username"
        value="admin"
        autocomplete="username"
        class="hidden"
        style="display: none"
      />
      <!-- password -->
      <div class="relative">
        <input
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          autocomplete="current-password"
          placeholder="••••••••"
          class="w-full bg-black/40 border-b-2 border-white/20 p-4 text-white placeholder:text-white/10 focus:outline-none focus:border-purple-600 transition-all tracking-[0.5em]"
          [disabled]="isLoading()"
        />
        <!-- error message  -->
        @if (errorMessage()) {
          <p
            class="text-red-500 text-[10px] mt-2 font-bold animate-pulse uppercase tracking-widest"
          >
            {{ errorMessage() }}
          </p>
        }
      </div>
      <!-- submit to send password via form -->
      <button
        type="submit"
        [disabled]="isLoading() || !password()"
        class="w-full py-4 bg-white text-black font-extrabold uppercase text-xs tracking-widest hover:bg-purple-600 hover:text-white transition-all disabled:opacity-20"
      >
        @if (!isLoading()) {
          <span>Initialize Session</span>
        } @else {
          <span class="animate-ping">. . .</span>
        }
      </button>
    </form>
  </div>

  <a
    routerLink="/"
    class="mt-12 text-gray-700 hover:text-white text-[10px] uppercase tracking-widest transition-colors cursor-pointer"
  >
    ← Return Home
  </a>
</div>
